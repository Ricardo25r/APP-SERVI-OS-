# Configuração do Alembic para o backend TrampoJá.
# A URL do banco NÃO é definida aqui: é injetada em runtime por
# alembic/env.py a partir de app.core.config.settings.DATABASE_URL.

[alembic]
# Caminho dos scripts de migration.
script_location = alembic

# Template usado ao gerar novas migrations (versão e data UTC).
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Caminho de busca de módulos (raiz do backend) para importar `app`.
prepend_sys_path = .

# Fuso horário para timestamps nos arquivos de migration.
# timezone =

# Separador de versões em diretórios.
version_path_separator = os

[post_write_hooks]
# Hooks opcionais (ex.: ruff) podem ser configurados aqui.

# Logging do Alembic.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
