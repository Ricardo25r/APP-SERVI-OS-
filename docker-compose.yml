# FazTudo — Ambiente de desenvolvimento (Docker Compose)
# Sintaxe: Compose Spec (sem a chave `version:` obsoleta).
#
# Por padrão `docker compose up` sobe SÓ a infraestrutura (db, redis, minio, createbuckets).
# O backend e o frontend ficam atrás do profile "full":
#   docker compose --profile full up        (infra + backend + frontend)
#
# Todas as variáveis vêm do arquivo `.env` (copie de `.env.example`).

name: faztudo

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — banco principal
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16
    container_name: faztudo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Script de init opcional (extensões uuid-ossp, pg_trgm, unaccent).
      # Roda apenas na primeira criação do volume.
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7 — cache / filas
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: faztudo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # MinIO — storage S3-compatível (dev)
  #   API:     http://localhost:9000
  #   Console: http://localhost:9001
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio
    container_name: faztudo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Credenciais root do MinIO = chaves S3 do contrato.
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # createbuckets — job efêmero: aguarda o MinIO e cria o bucket do projeto.
  # Roda uma vez e encerra (não fica de pé).
  # ---------------------------------------------------------------------------
  createbuckets:
    image: minio/mc
    container_name: faztudo-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY};
      mc mb --ignore-existing local/$${S3_BUCKET};
      mc anonymous set download local/$${S3_BUCKET};
      echo "Bucket $${S3_BUCKET} pronto.";
      exit 0;
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # backend — FastAPI/uvicorn (profile "full", perfil de dev com hot-reload)
  # ---------------------------------------------------------------------------
  backend:
    build: ./backend
    container_name: faztudo-backend
    restart: unless-stopped
    profiles: ["full"]
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    # Hot-reload em dev: o código é montado no container.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  # ---------------------------------------------------------------------------
  # frontend — Next.js (opcional, profile "full")
  # ---------------------------------------------------------------------------
  frontend:
    build: ./frontend
    container_name: faztudo-frontend
    restart: unless-stopped
    profiles: ["full"]
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:
  redisdata:
