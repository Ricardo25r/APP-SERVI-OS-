# FazTudo — PRODUÇÃO (Docker Compose) integrado ao Traefik da Hostinger.
#
# A VPS já tem um Traefik (network_mode: host) com Let's Encrypt (resolver
# "letsencrypt", entrypoint "websecure") que roteia por LABELS do Docker.
# Então NÃO subimos proxy próprio nas portas 80/443 — apenas publicamos os
# serviços com labels e o Traefik faz TLS + roteamento.
#
#  - faztudo.sispeed.com.br        → web (Caddy interno: SPA + /api -> backend)
#  - files.faztudo.sispeed.com.br  → MinIO (imagens; Host preservado p/ presign)
#
# db/redis/minio NÃO expõem porta no host. Variáveis vêm de `.env`
# (copie de infra/env.prod.example). Subir: bash scripts/deploy.sh

name: faztudo

networks:
  faztudo_net:
    name: faztudo_net

services:
  db:
    image: postgres:16
    container_name: faztudo-db
    restart: unless-stopped
    networks: [faztudo_net]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: faztudo-redis
    restart: unless-stopped
    networks: [faztudo_net]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: faztudo-minio
    restart: unless-stopped
    networks: [faztudo_net]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=faztudo_net
      - traefik.http.routers.faztudo-files.rule=Host(`files.inovacomunicacaovisual.com`)
      - traefik.http.routers.faztudo-files.entrypoints=websecure
      - traefik.http.routers.faztudo-files.tls.certresolver=letsencrypt
      - traefik.http.services.faztudo-files.loadbalancer.server.port=9000

  createbuckets:
    image: minio/mc
    networks: [faztudo_net]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY};
      mc mb --ignore-existing local/$${S3_BUCKET};
      mc anonymous set download local/$${S3_BUCKET};
      echo Bucket $${S3_BUCKET} pronto.;
      exit 0;
      "
    restart: "no"

  backend:
    build: ./backend
    container_name: faztudo-backend
    restart: unless-stopped
    networks: [faztudo_net]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  # Caddy interno (sem TLS, só :80): serve a SPA estática e faz proxy de /api.
  # O Traefik termina o HTTPS e roteia faztudo.sispeed.com.br -> este serviço.
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.web
    container_name: faztudo-web
    restart: unless-stopped
    networks: [faztudo_net]
    depends_on:
      - backend
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=faztudo_net
      - traefik.http.routers.faztudo-web.rule=Host(`app.inovacomunicacaovisual.com`)
      - traefik.http.routers.faztudo-web.entrypoints=websecure
      - traefik.http.routers.faztudo-web.tls.certresolver=letsencrypt
      - traefik.http.services.faztudo-web.loadbalancer.server.port=80

volumes:
  pgdata:
  miniodata:
  redisdata:
