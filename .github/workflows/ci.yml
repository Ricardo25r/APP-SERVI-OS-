name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela execuções antigas do mesmo ref quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # ---------------------------------------------------------------------
    # Quando houver testes que dependem de banco/redis, adicione `services:`
    # neste job (no nível do job, NÃO dentro de defaults). Exemplo:
    #
    # services:
    #   db:
    #     image: postgres:16
    #     env:
    #       POSTGRES_USER: faztudo
    #       POSTGRES_PASSWORD: faztudo_dev
    #       POSTGRES_DB: faztudo
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd "pg_isready -U faztudo"
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5
    #   redis:
    #     image: redis:7
    #     ports:
    #       - 6379:6379
    #     options: >-
    #       --health-cmd "redis-cli ping"
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5
    #
    # O teste de health (/api/v1/health) não precisa de DB, então mantemos
    # o job simples por enquanto.
    # ---------------------------------------------------------------------
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Use `npm ci` assim que o package-lock.json do frontend for commitado
      # (mais rápido e reprodutível). Enquanto não existir lockfile, usamos
      # `npm install`. TROCAR para: `npm ci`
      - name: Install dependencies
        run: npm install

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Build (next build)
        run: npm run build
